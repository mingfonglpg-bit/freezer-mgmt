<!DOCTYPE html>
<html class="dark" lang="zh-Hant">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#262a31",
                        "primary": "#bac3ff",
                        "on-surface": "#dfe2eb",
                        "surface-dim": "#10141a",
                        "outline-variant": "#454651",
                        "primary-container": "#5c6bc0"
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #10141a; color: #dfe2eb; font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen flex">

<aside class="hidden md:flex flex-col w-72 h-screen p-4 bg-[#181c22] rounded-r-3xl shadow-2xl fixed left-0 top-0 z-40">
    <div class="mb-10 px-4 py-6"><h1 class="text-lg font-bold text-[#bac3ff]">倉儲管理系統</h1></div>
    <nav class="flex-1 flex flex-col gap-2">
        <a class="text-[#c6c5d3] px-4 py-3 hover:bg-[#262a31] rounded-full flex items-center gap-4" href="index.html"><span class="material-symbols-outlined">dashboard</span>儀表板</a>
        <a class="bg-[#5c6bc0] text-white rounded-full px-4 py-3 flex items-center gap-4" href="query.html"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">location_on</span>庫位查詢</a>
        <a class="text-[#c6c5d3] px-4 py-3 hover:bg-[#262a31] rounded-full flex items-center gap-4" href="settings.html"><span class="material-symbols-outlined">settings</span>系統設定</a>
    </nav>
</aside>

<main class="flex-1 flex flex-col min-h-screen md:pl-72">
    <header class="flex justify-between items-center w-full px-6 h-16 bg-[#10141a]/80 backdrop-blur-xl fixed top-0 z-30 md:w-[calc(100%-18rem)]">
        <span class="text-[#bac3ff] font-bold text-xl">庫位查詢系統</span>
        <span class="text-[#c3c0ff] text-sm">V18.6</span>
    </header>

    <section class="mt-20 px-6 pb-24 max-w-5xl mx-auto w-full flex flex-col gap-8">
        <div class="mt-8">
            <p class="text-primary-container font-bold tracking-widest text-xs uppercase mb-2">Inventory Control</p>
            <h2 class="text-4xl font-bold text-on-surface">快速搜尋</h2>
        </div>

        <div class="bg-surface-container-high rounded-3xl p-6 border border-outline-variant/15 shadow-xl">
            <div class="flex flex-col md:flex-row gap-4">
                <input id="searchInput" type="text" placeholder="輸入料號、批號或庫位關鍵字..." 
                       class="flex-1 bg-surface-dim border-none rounded-2xl py-4 px-6 text-on-surface focus:ring-2 focus:ring-primary shadow-inner">
                <button onclick="fetchData()" class="bg-primary-container hover:bg-opacity-90 text-white px-8 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">sync</span> 執行查詢
                </button>
            </div>
        </div>

        <div id="resultContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2 text-center py-20 border-2 border-dashed border-outline-variant/20 rounded-3xl text-on-surface-variant">
                請輸入關鍵字進行查詢
            </div>
        </div>
    </section>
</main>

<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-[#10141a]/95 backdrop-blur-lg border-t border-[#ffffff15]">
    <a class="flex flex-col items-center p-2 text-[#c6c5d3]" href="index.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="text-[10px] mt-1">儀表板</span>
    </a>
    <a class="flex flex-col items-center p-2 text-primary" href="query.html">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">location_on</span>
        <span class="text-[10px] mt-1">查詢</span>
    </a>
    <a class="flex flex-col items-center p-2 text-[#c6c5d3]" href="settings.html">
        <span class="material-symbols-outlined">settings</span>
        <span class="text-[10px] mt-1">設定</span>
    </a>
</nav>

<script>
    // 請替換為您 GAS 部署後的 API 網址
    const API_URL = "您的_GAS_API_網址";

    async function fetchData() {
        const container = document.getElementById('resultContainer');
        const query = document.getElementById('searchInput').value;
        
        container.innerHTML = `
            <div class="md:col-span-2 text-center py-20 text-primary flex flex-col items-center gap-4">
                <div class="animate-spin"><span class="material-symbols-outlined text-4xl">sync</span></div>
                <p>正在從雲端資料庫抓取...</p>
            </div>
        `;

        try {
            const response = await fetch(`${API_URL}?search=${encodeURIComponent(query)}`);
            const data = await response.json();
            renderResults(data);
        } catch (error) {
            container.innerHTML = `<div class="md:col-span-2 text-center py-20 text-error">連線失敗，請檢查網路或 API 權限。</div>`;
        }
    }

    function renderResults(data) {
        const container = document.getElementById('resultContainer');
        if (!data || data.length === 0 || data.status === "failed") {
            container.innerHTML = `<div class="md:col-span-2 text-center py-20 text-on-surface-variant">查無符合條件的資料</div>`;
            return;
        }

        container.innerHTML = data.map(item => `
            <div class="bg-surface-container-high p-6 rounded-3xl border border-outline-variant/10 hover:border-primary/40 transition-all group">
                <div class="flex justify-between mb-4">
                    <span class="bg-primary/10 text-primary px-3 py-1 rounded-lg text-xs font-bold font-mono tracking-wider">
                        ${item.location}
                    </span>
                </div>
                <h3 class="text-2xl font-bold text-on-surface mb-6 group-hover:text-primary transition-colors">${item.partNo}</h3>
                
                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-outline-variant/10">
                    <div>
                        <p class="text-[10px] uppercase text-on-surface-variant font-black tracking-widest mb-1">BATCH / 批號</p>
                        <p class="text-sm font-medium text-on-surface">${item.batch}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] uppercase text-on-surface-variant font-black tracking-widest mb-1">EXPIRY / 效期</p>
                        <p class="text-sm font-bold text-primary">${item.expiryDate}</p>
                    </div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
