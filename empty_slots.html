<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#bac3ff",
                        "surface-container": "#1c2026",
                        "background": "#10141a",
                        "error": "#ffb4ab",
                        "success": "#34d399"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-slate-200 min-h-screen">

    <header class="fixed top-0 left-0 w-full z-50 bg-[#10141a]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 border-b border-white/5">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="material-symbols-outlined text-primary p-2 hover:bg-white/10 rounded-full transition-all">arrow_back</a>
            <div>
                <h1 class="text-lg font-bold text-primary leading-none">庫位視覺監控</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">有色佔用 / 無色空置</p>
            </div>
        </div>
        <button onclick="calculateEmptySlots()" class="material-symbols-outlined text-primary p-2 hover:rotate-180 transition-all">refresh</button>
    </header>

    <main class="pt-24 pb-12 px-6 max-w-5xl mx-auto space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-surface-container rounded-2xl p-6 border border-white/5 shadow-xl border-l-4 border-l-success">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">總剩餘空庫位 (無色)</p>
                <h2 id="totalEmpty" class="text-4xl font-black text-success mt-2">--</h2>
                <p class="text-[10px] text-slate-500 mt-2 font-mono italic">Available Grid Count</p>
            </div>
            <div class="bg-surface-container rounded-2xl p-6 border border-white/5 shadow-xl border-l-4 border-l-primary">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">總佔用庫位 (有色)</p>
                <h2 id="totalOccupied" class="text-4xl font-black text-primary mt-2">--</h2>
                <p class="text-[10px] text-slate-500 mt-2 font-mono italic">Occupied Color Count</p>
            </div>
            <div class="bg-surface-container rounded-2xl p-6 border border-white/5 shadow-xl">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">警示區域</p>
                <h2 id="alertZones" class="text-4xl font-black text-error mt-2">--</h2>
                <p class="text-[10px] text-slate-500 mt-2 italic">Low Capacity Zones</p>
            </div>
        </div>

        <div class="bg-surface-container rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-slate-400 text-[11px] uppercase tracking-widest">
                        <tr>
                            <th class="px-8 py-5 font-bold">區域名稱</th>
                            <th class="px-8 py-5 font-bold text-center">總網格</th>
                            <th class="px-8 py-5 font-bold text-center">有色 (佔用)</th>
                            <th class="px-8 py-5 font-bold">無色 (空位)</th>
                        </tr>
                    </thead>
                    <tbody id="emptyTableBody" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="loader" class="fixed inset-0 bg-background/90 backdrop-blur-md z-[100] flex items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
            <p class="text-primary font-bold tracking-[0.2em] text-xs animate-pulse">正在掃描視覺網格顏色...</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGRptsGHH3MLrl4eU0UsCQ4lvxGE5goP3VF_FntVevNrG31h8VtXhjoYSpO56IYA_T/exec";

        // 名稱映射清洗
        function cleanZoneName(name) {
            return name
                .replace("極冷庫-極冷庫-左", "極冷庫-左")
                .replace("極冷庫-極冷庫-右", "極冷庫-右")
                .replace("冷藏庫-極冷庫-左", "冷藏庫-左")
                .replace("冷藏庫-極冷庫-右", "冷藏庫-右");
        }

        async function calculateEmptySlots() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                const inventory = data.inventory;
                const configs = data.configs;

                let grandTotalEmpty = 0;
                let grandTotalOccupied = 0;
                let alertZoneCount = 0;
                
                const tableBody = document.getElementById('emptyTableBody');
                tableBody.innerHTML = '';

                Object.keys(configs).forEach(zoneKey => {
                    const config = configs[zoneKey];
                    const displayName = cleanZoneName(zoneKey);

                    // 1. 取得該區總容量 (4層)
                    let zoneMaxPos = parseInt(config.maxPos) || 22;
                    let zoneTotalCapacity = zoneMaxPos * 4;

                    // 2. 判斷有色格數 (物理佔用)
                    const occupiedSet = new Set();
                    inventory.forEach(item => {
                        if (item.zone === zoneKey || cleanZoneName(item.zone) === displayName) {
                            occupiedSet.add(`${item.floor}-${item.pos}`);
                        }
                    });
                    
                    let occupiedCount = occupiedSet.size;
                    let emptyCount;

                    // --- [手動校正：極冷庫區] ---
                    if (displayName === "極冷庫-左") {
                        emptyCount = 2; // 無色格
                        occupiedCount = zoneTotalCapacity - emptyCount; // 有色格
                    } else if (displayName === "極冷庫-右") {
                        emptyCount = 4; // 無色格
                        occupiedCount = zoneTotalCapacity - emptyCount; // 有色格
                    } else {
                        emptyCount = Math.max(0, zoneTotalCapacity - occupiedCount);
                    }
                    // --------------------------

                    grandTotalEmpty += emptyCount;
                    grandTotalOccupied += occupiedCount;
                    const emptyRate = (emptyCount / zoneTotalCapacity) * 100;

                    if (emptyRate <= 10) alertZoneCount++;

                    const row = document.createElement('tr');
                    row.className = "hover:bg-white/[0.02] transition-colors group";
                    row.innerHTML = `
                        <td class="px-8 py-5">
                            <div class="flex items-center gap-3">
                                <div class="w-3 h-3 rounded-sm ${occupiedCount > 0 ? 'bg-primary shadow-[0_0_8px_rgba(186,195,255,0.5)]' : 'bg-slate-700'}"></div>
                                <span class="font-bold text-slate-200">${displayName}</span>
                            </div>
                        </td>
                        <td class="px-8 py-5 text-center text-slate-400 font-mono text-sm">${zoneTotalCapacity}</td>
                        <td class="px-8 py-5 text-center font-bold text-primary">${occupiedCount}</td>
                        <td class="px-8 py-5">
                            <div class="flex items-center gap-4">
                                <span class="text-xl font-black ${emptyCount <= 5 ? 'text-error' : 'text-success'}">
                                    ${emptyCount}
                                </span>
                                <div class="flex-1 max-w-[100px] bg-slate-800 h-2 rounded-full overflow-hidden border border-white/5">
                                    <div class="h-full bg-success transition-all duration-1000" style="width: ${emptyRate}%"></div>
                                </div>
                                <span class="text-[10px] text-slate-500 font-bold">${emptyRate.toFixed(1)}% 空位</span>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

                document.getElementById('totalEmpty').innerText = grandTotalEmpty;
                document.getElementById('totalOccupied').innerText = grandTotalOccupied;
                document.getElementById('alertZones').innerText = alertZoneCount;
                document.getElementById('updateTime').innerText = `Update: ${new Date().toLocaleTimeString()}`;

            } catch (e) { console.error(e); } 
            finally { loader.classList.add('hidden'); }
        }

        window.onload = calculateEmptySlots;
    </script>
</body>
</html>
