<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❄️ 冷凍庫管理系統 V14.2</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-dark: #1e40af;
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --success: #10b981; 
            --dark: #0f172a; 
            --admin: #8b5cf6; 
            --mobile: #06b6d4; 
            --text-main: #334155;
            --text-light: #64748b;
        }
        
        html, body { font-family: -apple-system, "Noto Sans TC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text-main); padding: 0; margin: 0; line-height: 1.5; }

        /* 🚪 歡迎頁面美化 */
        #welcome-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #fff 0%, #e2e8f0 100%); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .welcome-sticker { width: 160px; margin-bottom: 25px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .btn-enter { background: var(--primary); color: white; border: none; padding: 16px 60px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: all 0.3s; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4); }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5); }

        /* 📊 主容器 */
        .container { width: 92%; max-width: 1100px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: 20px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* 📍 地圖區域優化 */
        .visual-scroll-wrapper { width: 100%; overflow-x: auto; padding: 5px 0; }
        .grid-container { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; min-width: 450px; }
        .slot { aspect-ratio: 1; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; transition: all 0.2s; font-weight: 600; color: var(--text-light); }
        .slot:hover { border-color: var(--primary); background: #eff6ff; }
        .slot.occupied { background: var(--primary); color: white; border: none; }
        .slot.warn { background: var(--warning) !important; color: white; border: none; }
        .slot.expire { background: var(--danger) !important; color: white; border: none; }

        /* 📱 手機模式優化 (一列 7 格) */
        .mobile-mode .grid-container { grid-template-columns: repeat(7, 1fr); min-width: 320px; }
        .mobile-mode .container { padding: 15px; width: 96%; }
        .mobile-mode .slot { font-size: 10px; border-radius: 6px; }

        /* 統計卡片美化 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 18px; border-radius: 16px; border: 1px solid #f1f5f9; text-align: center; background: #fff; transition: transform 0.3s; position: relative; overflow: hidden; }
        .stat-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); }
        .stat-card.left-card::before { background: var(--primary); }
        .stat-card.right-card::before { background: var(--warning); }
        .stat-card.total-card::before { background: var(--dark); }
        
        .stat-val { font-size: 26px; font-weight: 800; color: var(--dark); margin: 5px 0; }
        .progress-bg { background: #f1f5f9; height: 8px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* 表格樣式 */
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 20px; border: 1px solid #f1f5f9; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { background: #f8fafc; color: var(--text-light); font-weight: 600; padding: 14px 10px; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        td { padding: 14px 10px; border-bottom: 1px solid #f8fafc; }
        tr:hover { background: #fcfdfe; }

        /* 按鈕與輸入框 */
        .btn-toggle { padding: 9px 16px; border: 1px solid #e2e8f0; background:#fff; border-radius: 10px; cursor:pointer; font-weight:600; font-size: 13px; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-toggle:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-admin-active { color: white !important; background: var(--admin) !important; border-color: var(--admin); }
        .btn-mobile-active { color: white !important; background: var(--mobile) !important; border-color: var(--mobile); }

        .search-box { width:100%; padding:15px 20px; border: 2px solid #f1f5f9; border-radius: 14px; box-sizing:border-box; font-size:16px; margin-bottom:15px; transition: all 0.3s; background: #f8fafc; }
        .search-box:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        /* 🔄 載入動畫 */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 11000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 45px; height: 45px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #report-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 12000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    </style>
</head>
<body id="body-tag">

<div id="welcome-page">
    <img src="https://i.meee.com.tw/mAedyKQ.jpg" class="welcome-sticker">
    <h1 style="color:var(--dark); margin-bottom:30px; letter-spacing: 1px;">冷凍庫管理系統</h1>
    <button class="btn-enter" onclick="enterSystem()">進入系統</button>
</div>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-text" style="margin-top:15px; font-weight: bold; color: var(--primary);">資料同步中...</p>
</div>

<div id="report-modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--dark);">回報儲位狀況</h3>
        <p id="reportTarget" style="color:var(--primary); font-weight:bold; background:#eff6ff; padding:8px; border-radius:8px; display:inline-block;"></p>
        <div style="margin-top:15px;">
            <label style="font-size:13px; font-weight:600; color:var(--text-light);">狀況類型</label>
            <select id="reportType" style="width:100%; padding:12px; margin:8px 0 15px; border:1px solid #e2e8f0; border-radius:10px;">
                <option value="💡 正常">正常</option>
                <option value="⚠️ 異常/標示不明">異常/標示不明</option>
                <option value="🚫 申請報廢">申請報廢</option>
                <option value="📝 備註更新">純備註更新</option>
            </select>
            <label style="font-size:13px; font-weight:600; color:var(--text-light);">詳細說明</label>
            <textarea id="reportNote" style="width:100%; padding:12px; margin-top:8px; border:1px solid #e2e8f0; border-radius:10px; box-sizing:border-box;" rows="3" placeholder="請描述狀況..."></textarea>
        </div>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button onclick="closeReport()" style="flex:1; padding:12px; border:none; border-radius:10px; cursor:pointer; font-weight:600; background:#f1f5f9;">取消</button>
            <button onclick="submitReport()" style="flex:1; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">送出回報</button>
        </div>
    </div>
</div>

<div class="container" id="main-container">
    <div style="display:flex; flex-wrap: wrap; justify-content:space-between; align-items:center; margin-bottom:25px; gap: 15px;">
        <h2 style="margin:0; font-size: 22px; color: var(--dark); display:flex; align-items:center; gap:8px;">
            <span style="font-size:24px;">❄️</span> 冷凍庫管理系統 <span style="font-size:14px; opacity:0.5; background:#eee; padding:2px 8px; border-radius:10px;">V14.2</span>
        </h2>
        <div style="display:flex; gap:8px;">
            <button id="mobileToggleBtn" onclick="toggleMobileMode()" class="btn-toggle">📱 手機版</button>
            <button id="adminToggleBtn" onclick="toggleAdmin()" class="btn-toggle">🛠️ 管理模式</button>
            <button onclick="fetchData()" class="btn-toggle">🔄 刷新</button>
        </div>
    </div>

    <div id="admin-panel" style="display:none; background:#fdfaff; border:2px dashed var(--admin); padding:20px; border-radius:16px; margin-bottom:25px;">
        <b style="color:var(--admin); font-size:16px;">➕ 新增入庫紀錄</b>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top:15px;">
            <select id="addZone" style="padding:10px; border-radius:8px; border:1px solid #ddd;"><option value="左">左庫</option><option value="右">右庫</option></select>
            <select id="addFloor" style="padding:10px; border-radius:8px; border:1px solid #ddd;"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            <input type="number" id="addPos" placeholder="儲位" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="text" id="addName" placeholder="品名" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="text" id="addBatch" placeholder="批號" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="date" id="addDate" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="commitAdd()" style="background:var(--admin); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; grid-column: span 1;">確認新增</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card total-card">
            <small style="color:var(--text-light); font-weight:600;">🏢 總庫使用率</small>
            <div id="totalRate" class="stat-val">0%</div>
            <div class="progress-bg"><div id="totalBar" class="progress-fill" style="background:var(--dark); width:0%;"></div></div>
            <small id="totalDetail" style="color:var(--text-light); font-size:12px;">0 / 176</small>
        </div>
        <div class="stat-card left-card">
            <small style="color:var(--text-light); font-weight:600;">⬅️ 左庫使用率</small>
            <div id="leftRate" class="stat-val">0%</div>
            <div class="progress-bg"><div id="leftBar" class="progress-fill" style="background:var(--primary); width:0%;"></div></div>
            <small id="leftDetail" style="color:var(--text-light); font-size:12px;">0 / 88</small>
        </div>
        <div class="stat-card right-card">
            <small style="color:var(--text-light); font-weight:600;">➡️ 右庫使用率</small>
            <div id="rightRate" class="stat-val">0%</div>
            <div class="progress-bg"><div id="rightBar" class="progress-fill" style="background:var(--warning); width:0%;"></div></div>
            <small id="rightDetail" style="color:var(--text-light); font-size:12px;">0 / 88</small>
        </div>
    </div>

    <div style="background:#fff; padding:15px; border-radius:16px; margin-bottom:25px; border:1px solid #f1f5f9;">
        <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:15px;">
            <b style="font-size:15px; color:var(--dark);">📍 儲位地圖 (<span id="col-count-text">11</span>格)</b>
            <div style="display:flex; gap:5px; background:#f1f5f9; padding:4px; border-radius:10px;">
                <select id="vZone" onchange="renderVisual()" style="border:none; background:transparent; font-weight:bold; padding:2px 8px;"><option value="左">左</option><option value="右">右</option></select>
                <select id="vFloor" onchange="renderVisual()" style="border:none; background:transparent; font-weight:bold; padding:2px 8px;"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            </div>
        </div>
        <div class="visual-scroll-wrapper">
            <div id="visualGrid" class="grid-container"></div>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋品名、批號、儲位..." oninput="resetPageAndRender()">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>儲位</th><th>品名 / 批號</th><th>效期</th><th>備註</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-top:25px;">
        <button id="prevBtn" class="btn-toggle" onclick="changePage(-1)" style="padding:10px 25px;">←</button>
        <span id="pageInfo" style="font-weight:700; color:var(--dark); font-size:15px; min-width:60px; text-align:center;">1 / 1</span>
        <button id="nextBtn" class="btn-toggle" onclick="changePage(1)" style="padding:10px 25px;">→</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSsIsMFiQNmlz-glRkW3Chyb_uCgajUphA0fAqR8IqCp-y9NPUzf1tV7jLrWsskN-7KQ/exec";
    // 密碼雜湊化處理 (Base64 admin123)
    const _KEY = "YWRtaW4xMjM="; 
    let inventory = [], isAdmin = false, isMobileMode = false, currentPage = 1, pageSize = 10;

    function enterSystem() {
        document.getElementById('welcome-page').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            fetchData(); 
        }, 500);
    }

    async function fetchData() {
        toggleLoader(true, "讀取雲端庫存...");
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            inventory = (data || []).map(i => ({
                id: i.rowId || i.id || "",
                zone: i.zone || i["區域"] || "",
                floor: i.floor || i["樓層"] || "",
                pos: i.pos || i["位置"] || "",
                name: i.name || i["品名"] || "",
                date: i.date || i["效期"] || "",
                note: i.note || i["備註"] || "",
                batch: i.batch || i["批號"] || ""
            }));
            renderAll();
        } catch (e) { alert("無法連線至資料庫"); }
        toggleLoader(false);
    }

    function renderAll() { updateStats(); renderVisual(); render(); }
    function resetPageAndRender() { currentPage = 1; render(); }

    function render() {
        const body = document.getElementById('tableBody');
        const kw = document.getElementById('searchInput').value.toLowerCase();
        const filtered = inventory.filter(i => `${i.zone}${i.floor}-${i.pos} ${i.name} ${i.batch}`.toLowerCase().includes(kw));
        const totalPages = Math.ceil(filtered.length / pageSize) || 1;
        const pagedData = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);

        document.getElementById('pageInfo').innerText = `${currentPage} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);

        body.innerHTML = pagedData.map(item => `
            <tr>
                <td><b style="color:var(--primary); font-size:15px;">${item.zone}${item.floor}-${item.pos}</b></td>
                <td>
                    <div style="font-weight:600;">${item.name}</div>
                    <div style="color:var(--text-light); font-size:11px;">批號: ${item.batch || '-'}</div>
                </td>
                <td><span style="font-family:monospace; font-size:13px;">${item.date ? item.date.split('T')[0] : '-'}</span></td>
                <td style="max-width:140px; font-size:12px; color:var(--text-light);">${item.note || ''}</td>
                <td>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <button onclick="openReport('${item.zone}${item.floor}-${item.pos}')" style="color:var(--primary); border:1px solid var(--primary); background:#fff; border-radius:6px; padding:4px 8px; font-size:12px; cursor:pointer; font-weight:600;">回報</button>
                        ${isAdmin ? `<button onclick="deleteItem('${item.id}')" style="color:var(--danger); border:1px solid var(--danger); background:#fff; border-radius:6px; padding:4px 8px; font-size:12px; cursor:pointer;">刪除</button>` : ''}
                    </div>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-light);">無相符庫存資料</td></tr>';
    }

    function toggleMobileMode() {
        isMobileMode = !isMobileMode;
        const btn = document.getElementById('mobileToggleBtn');
        const colText = document.getElementById('col-count-text');
        if (isMobileMode) {
            pageSize = 5; btn.innerHTML = "💻 電腦版"; btn.classList.add('btn-mobile-active');
            document.getElementById('body-tag').classList.add('mobile-mode'); colText.innerText = "7";
        } else {
            pageSize = 10; btn.innerHTML = "📱 手機版"; btn.classList.remove('btn-mobile-active');
            document.getElementById('body-tag').classList.remove('mobile-mode'); colText.innerText = "11";
        }
        resetPageAndRender();
    }

    function toggleAdmin() {
        if (!isAdmin) {
            const pw = prompt("系統認證：");
            if (pw && btoa(pw) === _KEY) {
                isAdmin = true;
                document.getElementById('adminToggleBtn').innerHTML = "🚪 離開管理";
                document.getElementById('adminToggleBtn').classList.add('btn-admin-active');
                document.getElementById('admin-panel').style.display = 'block';
                render();
            } else if (pw !== null) alert("授權碼錯誤");
        } else {
            isAdmin = false;
            document.getElementById('adminToggleBtn').innerHTML = "🛠️ 管理模式";
            document.getElementById('adminToggleBtn').classList.remove('btn-admin-active');
            document.getElementById('admin-panel').style.display = 'none';
            render();
        }
    }

    function updateStats() {
        const count = (z) => new Set(inventory.filter(i => (z ? i.zone === z : true) && i.pos).map(i => `${i.zone}${i.floor}-${i.pos}`)).size;
        const L = count("左"), R = count("右"), T = count(null);
        const setUI = (id, cur, max) => {
            const r = Math.round(cur/max*100);
            document.getElementById(id+'Rate').innerText = r + "%";
            document.getElementById(id+'Bar').style.width = r + "%";
            document.getElementById(id+'Detail').innerText = `${cur} / ${max}`;
        };
        setUI('total', T, 176); setUI('left', L, 88); setUI('right', R, 88);
    }

    function renderVisual() {
        const grid = document.getElementById('visualGrid'), zone = document.getElementById('vZone').value, floor = document.getElementById('vFloor').value;
        grid.innerHTML = '';
        for (let i = 1; i <= 22; i++) {
            const items = inventory.filter(d => d.zone === zone && d.floor === floor && parseInt(d.pos) === i);
            const slot = document.createElement('div');
            slot.className = 'slot' + (items.length > 0 ? ' occupied' : '');
            slot.innerHTML = `<span>${i}</span>`;
            if (items.some(it => (it.note||'').includes('報廢') || (it.note||'').includes('🚫'))) slot.classList.add('expire');
            else if (items.some(it => (it.note||'').includes('⚠️') || (it.note||'').includes('異常'))) slot.classList.add('warn');
            slot.onclick = () => { document.getElementById('searchInput').value = `${zone}${floor}-${i}`; resetPageAndRender(); };
            grid.appendChild(slot);
        }
    }

    function changePage(n) { currentPage += n; render(); }
    function toggleLoader(s, t="同步中...") { document.getElementById('loader-text').innerText=t; document.getElementById('loader').style.display=s?'flex':'none'; }
    function openReport(pos) { document.getElementById('reportTarget').innerText = "目標：" + pos; document.getElementById('report-modal').style.display = 'flex'; }
    function closeReport() { document.getElementById('report-modal').style.display = 'none'; document.getElementById('reportNote').value = ""; }
    
    async function submitReport() {
        const note = document.getElementById('reportNote').value;
        if(!note) return alert("請輸入說明");
        toggleLoader(true, "數據回報中...");
        try {
            await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({action:'report', target:document.getElementById('reportTarget').innerText.replace("目標：",""), type:document.getElementById('reportType').value, note:note}) });
            alert("提交成功"); closeReport(); fetchData();
        } catch(e) { alert("失敗"); }
        toggleLoader(false);
    }
    
    async function commitAdd() {
        const newData = { action:"add", zone:document.getElementById('addZone').value, floor:document.getElementById('addFloor').value, pos:document.getElementById('addPos').value, name:document.getElementById('addName').value, batch:document.getElementById('addBatch').value, date:document.getElementById('addDate').value };
        if(!newData.pos || !newData.name) return alert("必填欄位缺失");
        toggleLoader(true, "數據寫入中...");
        try { await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body:JSON.stringify(newData) }); alert("新增紀錄成功"); fetchData(); } catch(e) { alert("錯誤"); }
        toggleLoader(false);
    }
    
    async function deleteItem(id) { if(confirm("確定刪除此筆資料？")) { toggleLoader(true, "刪除中..."); await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'delete', id:id})}); fetchData(); } }
</script>
</body>
</html>
