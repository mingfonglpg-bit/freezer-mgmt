<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.meee.com.tw/mAedyKQ.jpg">
    
    <title>冷凍庫管理系統 V16.1</title>
    <style>
        :root { 
            --primary: #2563eb; --bg: #f8fafc; --card-bg: #ffffff; 
            --warning: #f59e0b; --danger: #ef4444; --success: #16a34a;
            --new: #3b82f6; --admin: #8b5cf6; --mobile: #06b6d4; 
            --text-main: #334155; --text-light: #64748b;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 40px; }

        /* 🚪 歡迎頁面 */
        #welcome-page { 
            position: fixed; inset: 0; background: #fff; z-index: 30000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .welcome-sticker { width: 150px; height: 150px; object-fit: cover; border-radius: 30px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-enter { background: var(--primary); color: white; border: none; padding: 18px 80px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(37,99,235,0.3); }

        .container { display: none; width: 98%; max-width: 1200px; margin: 15px auto; background: var(--card-bg); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* 📊 統計區 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 12px; border-radius: 18px; border: 1px solid #f1f5f9; text-align: center; }
        .stat-val { font-size: 22px; font-weight: 800; margin: 5px 0; }

        /* 🎨 標籤顏色 */
        .note-tag { font-weight: 800; font-size: 13px; padding: 4px 8px; border-radius: 6px; }
        .note-normal { color: var(--success); background: #f0fdf4; }
        .note-warn { color: var(--warning); background: #fffbeb; }
        .note-danger { color: var(--danger); background: #fef2f2; }
        
        /* ✨ 新入庫樣式 */
        .new-row { background-color: #eff6ff !important; border-left: 5px solid var(--new); }
        .new-badge { background: var(--new); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* 🛠️ 管理員面板 */
        #admin-panel { display: none; background: #fdfaff; border: 2px dashed var(--admin); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .admin-input { padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; width: 100%; }

        /* 📍 地圖區 */
        .visual-scroll-wrapper { width: 100%; overflow-x: auto; padding: 5px 0; }
        .grid-container { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; min-width: 480px; }
        body.mobile-mode .grid-container { grid-template-columns: repeat(7, 1fr); min-width: 320px; }
        .slot { aspect-ratio: 1; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 13px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; font-weight: 700; color: #94a3b8; }
        .slot.occupied { background: var(--primary); color: white; border: none; }
        .slot.expire { background: var(--danger) !important; color: white !important; }
        .slot.warn { background: var(--warning) !important; color: white !important; }

        /* 📋 表格 */
        .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid #f1f5f9; border-radius: 16px; background: #fff; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 15px 10px; border-bottom: 1px solid #f8fafc; text-align: left; }
        th { background: #f8fafc; color: var(--text-light); font-size: 14px; }
        
        .btn-action { padding: 6px 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }
        .nav-btn { padding: 8px 15px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
        .page-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
        
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 50000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body id="body-node">

<div id="welcome-page">
    <img src="https://i.meee.com.tw/mAedyKQ.jpg" class="welcome-sticker" alt="Logo">
    <h2 style="margin: 0; letter-spacing: 2px;">冷凍庫管理系統</h2>
    <p style="color:var(--text-light); margin-bottom: 35px;">V16.1 Sort-Alert Edition</p>
    <button class="btn-enter" onclick="enterSystem()">進入系統</button>
</div>

<div id="loader"><div class="spinner"></div><p id="loader-text">同步中...</p></div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h3>📋 狀態變更</h3>
        <p id="reportTarget" style="color:var(--primary); font-weight:bold;"></p>
        <select id="reportType" class="admin-input" style="margin:10px 0;">
            <option value="✅ 正常">✅ 正常/解除標記</option>
            <option value="⚠️ 異常">⚠️ 異常/標示不明</option>
            <option value="♻️ 報廢">♻️ 報廢/過期</option>
        </select>
        <textarea id="reportNote" rows="3" class="admin-input" placeholder="細節說明..."></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeReport()" style="flex:1; padding:12px; border:none; border-radius:10px; background:#eee;">取消</button>
            <button onclick="submitReport()" style="flex:1; padding:12px; border:none; border-radius:10px; background:var(--primary); color:white; font-weight:bold;">提交</button>
        </div>
    </div>
</div>

<div class="container" id="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0;">❄️ 即時庫位看板</h3>
        <div style="display:flex; gap:8px;">
            <button onclick="toggleMobileMode()" id="mobileBtn" class="nav-btn">📱 手機版</button>
            <button onclick="toggleAdmin()" id="adminBtn" class="nav-btn">🛠️ 管理員</button>
            <button onclick="fetchData()" class="nav-btn">🔄 刷新</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div>總庫使用率</div><div id="totalRate" class="stat-val">0%</div><small id="totalDetail">0/176</small></div>
        <div class="stat-card"><div style="color:var(--primary)">左庫使用率</div><div id="leftRate" class="stat-val" style="color:var(--primary)">0%</div><small id="leftDetail">0/88</small></div>
        <div class="stat-card"><div style="color:var(--warning)">右庫使用率</div><div id="rightRate" class="stat-val" style="color:var(--warning)">0%</div><small id="rightDetail">0/88</small></div>
    </div>

    <div id="admin-panel">
        <b style="color:var(--admin); font-size:16px;">➕ 新增入庫紀錄</b>
        <div class="admin-grid">
            <select id="addZone" class="admin-input"><option value="左">左庫</option><option value="右">右庫</option></select>
            <select id="addFloor" class="admin-input"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            <input type="number" id="addPos" class="admin-input" placeholder="位置(1-22)">
            <input type="text" id="addName" class="admin-input" placeholder="品名">
            <input type="text" id="addBatch" class="admin-input" placeholder="批號">
            <input type="date" id="addDate" class="admin-input">
            <button onclick="commitAdd()" style="background:var(--admin); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">存檔</button>
        </div>
    </div>

    <div style="background:#fff; padding:15px; border-radius:20px; margin-bottom:20px; border:1px solid #f1f5f9;">
        <div style="margin-bottom:10px; display:flex; gap:10px; align-items:center;">
            <b>區域</b><select id="vZone" onchange="renderVisual()"><option value="左">左庫</option><option value="右">右庫</option></select>
            <b>樓層</b><select id="vFloor" onchange="renderVisual()"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
        </div>
        <div class="visual-scroll-wrapper"><div id="visualGrid" class="grid-container"></div></div>
    </div>

    <input type="text" id="searchInput" style="width:100%; padding:15px; border:2px solid #f1f5f9; border-radius:12px; margin-bottom:15px;" placeholder="🔍 快速搜尋..." oninput="currentPage=1; render();">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width:100px;">儲位</th>
                    <th>品名</th>
                    <th style="width:120px;">批號</th>
                    <th style="width:110px;">效期</th>
                    <th>狀態備註</th>
                    <th style="width:140px;">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="pagination">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageIdx" style="font-weight:bold;">第 1 頁</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMoT43hjHIzvcI11yk3C-Q9xLQe1h4hdOBAs26FbldiG0GNEI94yG5dVZtVkwdnjpePw/exec"; 
    let inventory = [], currentPage = 1, pageSize = 10, isAdmin = false;
    let newlyAddedId = null; // 暫存新入庫的 ID

    function enterSystem() {
        document.getElementById('welcome-page').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        fetchData();
    }

    async function fetchData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
            const data = await res.json();
            // 💡 關鍵修復：反轉陣列讓最新資料在最前，並確保 ID 存在
            const rawData = (data || []).reverse(); 
            inventory = rawData.map(i => ({
                id: i.rowId, zone: i["區域"]||i.zone, floor: i["樓層"]||i.floor,
                pos: i["位置"]||i.pos, name: i["品名"]||i.name, batch: i["批號"]||i.batch,
                date: i["效期"]||i.date, note: i["備註"]||i.note
            }));
            renderAll();
        } catch (e) { alert("讀取失敗"); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderAll() { updateStats(); renderVisual(); render(); }

    function getNoteHTML(note) {
        if (!note) return '-';
        let cls = 'note-normal';
        if (note.includes('報廢') || note.includes('過期')) cls = 'note-danger';
        else if (note.includes('⚠️') || note.includes('異常')) cls = 'note-warn';
        else if (note.includes('✅') || note.includes('正常')) cls = 'note-normal';
        return `<span class="note-tag ${cls}">${note}</span>`;
    }

    function render() {
        const body = document.getElementById('tableBody');
        const kw = document.getElementById('searchInput').value.toLowerCase();
        
        // 搜尋過濾
        let filtered = inventory.filter(i => `${i.zone}${i.floor}-${i.pos}${i.name}${i.batch}${i.note}`.toLowerCase().includes(kw));
        
        // 分頁邏輯
        const totalPages = Math.ceil(filtered.length / pageSize) || 1;
        const start = (currentPage - 1) * pageSize;
        const pageData = filtered.slice(start, start + pageSize);

        body.innerHTML = pageData.map(item => {
            // 判斷是否為新入庫資料
            const isNew = (item.id === newlyAddedId);
            return `
            <tr class="${isNew ? 'new-row' : ''}">
                <td><b>${item.zone}${item.floor}-${item.pos}</b></td>
                <td>${isNew ? '<span class="new-badge">✨ 新入庫</span>' : ''}${item.name || '-'}</td>
                <td><small>${item.batch || '-'}</small></td>
                <td><small>${item.date ? item.date.split('T')[0] : '-'}</small></td>
                <td>${getNoteHTML(item.note)}</td>
                <td>
                    <button class="btn-action" style="background:#fef3c7; color:#d97706;" onclick="openReport('${item.zone}${item.floor}-${item.pos}')">回報</button>
                    ${isAdmin ? `<button class="btn-action" style="background:#fee2e2; color:#dc2626; margin-left:5px;" onclick="deleteItem('${item.id}')">刪除</button>` : ''}
                </td>
            </tr>
        `}).join('') || '<tr><td colspan="6" style="text-align:center; padding:30px;">查無資料</td></tr>';

        document.getElementById('pageIdx').innerText = "第 " + currentPage + " 頁";
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage >= totalPages);
    }

    function renderVisual() {
        const grid = document.getElementById('visualGrid'), zone = document.getElementById('vZone').value, floor = document.getElementById('vFloor').value;
        grid.innerHTML = '';
        for (let i = 1; i <= 22; i++) {
            const items = inventory.filter(d => d.zone === zone && d.floor === floor && parseInt(d.pos) === i);
            const slot = document.createElement('div');
            slot.className = 'slot' + (items.length > 0 ? ' occupied' : '');
            slot.innerText = i;
            if (items.some(it => (it.note || '').includes('報廢'))) slot.classList.add('expire');
            else if (items.some(it => (it.note || '').includes('⚠️') || (it.note || '').includes('異常'))) slot.classList.add('warn');
            slot.onclick = () => { document.getElementById('searchInput').value = `${zone}${floor}-${i}`; currentPage=1; render(); };
            grid.appendChild(slot);
        }
    }

    async function commitAdd() {
        const newData = { action: "add", zone: document.getElementById('addZone').value, floor: document.getElementById('addFloor').value, pos: document.getElementById('addPos').value, name: document.getElementById('addName').value, batch: document.getElementById('addBatch').value, date: document.getElementById('addDate').value };
        if(!newData.name || !newData.pos) return alert("必填欄位空白");
        
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader-text').innerText = "存檔中，請稍候...";
        
        await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body:JSON.stringify(newData) });
        
        // 模擬存檔後標記新 ID (因為 no-cors 無法回傳真實 ID，以最新一筆當作目標)
        newlyAddedId = "LAST_ONE"; 
        
        setTimeout(() => {
            fetchData();
            currentPage = 1; // 回到第一頁看新資料
            document.getElementById('loader-text').innerText = "同步中...";
        }, 1200);
    }

    function openReport(pos) {
        document.getElementById('reportTarget').innerText = "目標儲位：" + pos;
        document.getElementById('reportModal').style.display = 'flex';
    }
    function closeReport() { document.getElementById('reportModal').style.display = 'none'; }

    async function submitReport() {
        const type = document.getElementById('reportType').value;
        const note = document.getElementById('reportNote').value;
        const target = document.getElementById('reportTarget').innerText.replace("目標儲位：", "");
        document.getElementById('loader').style.display = 'flex';
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'report', target: target, type: type, note: note }) });
        closeReport();
        setTimeout(fetchData, 800);
    }

    function toggleAdmin() {
        if (isAdmin) { isAdmin = false; applyAdminUI(false); }
        else {
            const pw = prompt("授權密碼：");
            if (pw === "admin123") { isAdmin = true; applyAdminUI(true); }
        }
    }
    function applyAdminUI(state) {
        document.getElementById('adminBtn').style.background = state ? 'var(--admin)' : '#fff';
        document.getElementById('adminBtn').style.color = state ? '#fff' : 'var(--text-main)';
        document.getElementById('admin-panel').style.display = state ? 'block' : 'none';
        render();
    }

    function toggleMobileMode() {
        const isMobile = document.getElementById('body-node').classList.toggle('mobile-mode');
        document.getElementById('mobileBtn').style.background = isMobile ? 'var(--mobile)' : '#fff';
        document.getElementById('mobileBtn').style.color = isMobile ? '#fff' : 'var(--text-main)';
        renderVisual();
    }

    function changePage(step) { currentPage += step; render(); }
    
    function updateStats() {
        const count = (z) => new Set(inventory.filter(i => (z ? i.zone === z : true) && i.pos).map(i => `${i.zone}${i.floor}-${i.pos}`)).size;
        const L = count("左"), R = count("右"), T = count(null);
        document.getElementById('totalRate').innerText = Math.round(T/176*100) + "%";
        document.getElementById('totalDetail').innerText = `${T}/176`;
        document.getElementById('leftRate').innerText = Math.round(L/88*100) + "%";
        document.getElementById('leftDetail').innerText = `${L}/88`;
        document.getElementById('rightRate').innerText = Math.round(R/88*100) + "%";
        document.getElementById('rightDetail').innerText = `${R}/88`;
    }

    async function deleteItem(id) {
        if(confirm("確定刪除？")) {
            document.getElementById('loader').style.display = 'flex';
            await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'delete', id:id})});
            setTimeout(fetchData, 800);
        }
    }
</script>
</body>
</html>
